<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<title>NEXA · Motion Sketch v3 · Title explosion + logo grow</title>
<link href="nx-tokens.css" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@0,300;0,400;0,500;0,700;1,400;1,700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  html, body {
    width: 100%; height: 100%;
    /* INVERTED palette: lighter warm grey bg, darker bars (matches RS cover) */
    background: #3D3D3B;
    color: var(--nx-on-ink);
    font-family: var(--nx-font-sans);
    overflow: hidden;
    cursor: none;
  }

  .stage { position: fixed; inset: 0; overflow: hidden; }
  .parallax { position: absolute; inset: 0; will-change: transform; }

  /* ─────────────────────────────────────────────
     TOP NAV
     ───────────────────────────────────────────── */
  .topnav {
    position: absolute;
    top: 22px;
    left: clamp(28px, 4vw, 64px);
    right: clamp(28px, 4vw, 64px);
    display: flex;
    align-items: center;
    justify-content: space-between;
    font-family: var(--nx-font-mono);
    font-size: 11px;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--nx-mid);
    z-index: 30;
    opacity: 0;
    animation: fadeIn 800ms var(--nx-ease-out) 200ms forwards;
  }
  .topnav .left .dot {
    display: inline-block;
    width: 6px; height: 6px;
    background: var(--nx-orange);
    border-radius: 50%;
    margin-right: 10px;
    vertical-align: middle;
    animation: pulseDot 1.8s ease-in-out infinite;
  }
  .topnav .brand-center {
    display: flex; align-items: center; gap: 10px;
    color: var(--nx-on-ink);
  }
  .topnav .brand-center svg { width: 18px; height: 18px; }
  .topnav .brand-center svg line { stroke: var(--nx-orange); stroke-width: 12; fill: none; }
  .topnav .right { display: flex; align-items: center; gap: 22px; }
  .topnav .pdf {
    background: var(--nx-orange);
    color: white;
    border: 0;
    font-family: inherit;
    font-size: inherit;
    letter-spacing: inherit;
    text-transform: inherit;
    padding: 8px 18px;
    border-radius: var(--nx-r-pill);
    display: flex; align-items: center; gap: 8px;
    cursor: none;
    transition: background 200ms;
  }
  .topnav .pdf:hover { background: var(--nx-orange-deep); }
  .topnav .lang b { color: var(--nx-on-ink); border-bottom: 1px solid var(--nx-orange); padding-bottom: 1px; }
  .topnav .lang em { font-style: normal; opacity: 0.55; margin-left: 8px; }

  @keyframes pulseDot {
    0%, 100% { opacity: 1; transform: scale(1); }
    50% { opacity: 0.4; transform: scale(0.6); }
  }
  @keyframes fadeIn { to { opacity: 1; } }

  /* ─────────────────────────────────────────────
     MODE SEGMENTED CONTROL
     ───────────────────────────────────────────── */
  .modes {
    position: absolute;
    top: 68px;
    right: clamp(28px, 4vw, 64px);
    display: flex;
    z-index: 30;
    border: 1px solid var(--nx-ink-3);
    border-radius: var(--nx-r-pill);
    overflow: hidden;
    background: rgba(3, 2, 12, 0.4);
    backdrop-filter: blur(8px);
    opacity: 0;
    animation: fadeIn 800ms var(--nx-ease-out) 400ms forwards;
  }
  .modes button {
    background: transparent;
    border: 0;
    color: var(--nx-mid);
    font-family: var(--nx-font-mono);
    font-size: 9.5px;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    padding: 9px 14px;
    cursor: none;
    transition: all 220ms var(--nx-ease-out);
    border-right: 1px solid var(--nx-ink-3);
    position: relative;
  }
  .modes button:last-child { border-right: 0; }
  .modes button:hover { color: var(--nx-on-ink); }
  .modes button.active {
    color: var(--nx-orange);
    background: rgba(200, 82, 4, 0.10);
  }
  .modes button.active::before {
    content: ""; position: absolute; bottom: 0; left: 50%;
    transform: translateX(-50%);
    width: 14px; height: 2px;
    background: var(--nx-orange);
  }

  /* ─────────────────────────────────────────────
     SKYLINE BARS
     ───────────────────────────────────────────── */
  .skyline { position: absolute; inset: 0; pointer-events: none; }
  .bar {
    position: absolute;
    height: 18px;
    background: #1A1A18;
    transform-origin: 50% 50%;
    will-change: transform, opacity, background-color;
    border-radius: 1px;
    transition: background-color 240ms var(--nx-ease-out);
  }
  .bar.touched { background: var(--nx-orange); }

  /* ─────────────────────────────────────────────
     TITLE STROKES LAYER (left)
     ───────────────────────────────────────────── */
  .title-layer {
    position: absolute;
    inset: 0;
    pointer-events: none;
  }
  .ts {
    position: absolute;
    left: 0; top: 0;
    /* match the stem thickness of Montserrat Regular @ ~90px */
    height: 5px;
    background: var(--nx-on-ink);
    transform-origin: 0 50%;
    border-radius: 1.5px;
    will-change: transform, opacity;
    transition:
      transform 1800ms cubic-bezier(0.65, 0, 0.2, 1),
      opacity 1300ms ease;
    opacity: 0;
  }
  .title-layer.fade .ts { opacity: 0 !important; transition: opacity 900ms ease; }

  /* Clean final title — fades in after strokes assemble */
  .title-final {
    position: absolute;
    left: clamp(28px, 4.5vw, 96px);
    top: clamp(80px, 14vh, 160px);
    font-family: var(--nx-font-sans);
    /* heavier weight so the stem width matches the entering sticks */
    font-weight: 400;
    font-size: clamp(38px, 5.6vw, 92px);
    line-height: 1.04;
    letter-spacing: -0.015em;
    color: var(--nx-on-ink);
    text-transform: uppercase;
    opacity: 0;
    transition: opacity 900ms var(--nx-ease-out);
    z-index: 5;
    pointer-events: none;
    max-width: 60vw;
  }
  .title-final.show { opacity: 1; }
  .title-final .l2 { display: block; }

  /* ─────────────────────────────────────────────
     "2025" + QUOTE (left, immediately under title)
     ───────────────────────────────────────────── */
  .below-title {
    position: absolute;
    left: clamp(28px, 5vw, 96px);
    top: clamp(220px, 32vh, 360px);
    z-index: 8;
    max-width: 44vw;
  }
  .year {
    font-family: var(--nx-font-sans);
    font-weight: 300;
    font-size: clamp(72px, 8vw, 124px);
    line-height: 0.88;
    letter-spacing: -0.04em;
    color: var(--nx-orange);
    margin-bottom: 22px;
    opacity: 0;
    transform: translateY(20px);
    animation: yearIn 900ms var(--nx-ease-arch) 2900ms forwards;
  }
  @keyframes yearIn { to { opacity: 1; transform: translateY(0); } }

  .quote {
    font-family: var(--nx-font-sans);
    font-style: italic;
    font-weight: 400;
    font-size: clamp(13px, 1.05vw, 16px);
    line-height: 1.55;
    letter-spacing: 0.01em;
    color: var(--nx-mid);
    max-width: 380px;
    opacity: 0;
    animation: fadeIn 900ms var(--nx-ease-out) 3400ms forwards;
  }
  .quote::before { content: '"'; color: var(--nx-orange); margin-right: 2px; }
  .quote::after  { content: '"'; color: var(--nx-orange); margin-left: 2px; }
  .quote-attr {
    display: block;
    margin-top: 14px;
    font-family: var(--nx-font-mono);
    font-style: normal;
    font-size: 10.5px;
    letter-spacing: 0.22em;
    color: var(--nx-mid);
    text-transform: uppercase;
  }
  .quote-attr::before { content: "— "; }

  /* ─────────────────────────────────────────────
     CENTER X-ICON (grows in)
     ───────────────────────────────────────────── */
  .center-x {
    position: absolute;
    left: 50%;
    top: 50%;
    transform: translate(-50%, -50%) scale(0) rotate(-12deg);
    z-index: 7;
    width: clamp(180px, 26vw, 380px);
    height: clamp(180px, 26vw, 380px);
    opacity: 0;
    animation: xGrow 1500ms var(--nx-ease-spring) 1600ms forwards;
  }
  @keyframes xGrow {
    0%   { transform: translate(-50%, -50%) scale(0)   rotate(-12deg); opacity: 0; }
    60%  { opacity: 1; }
    100% { transform: translate(-50%, -50%) scale(1)   rotate(0deg);   opacity: 1; }
  }
  .center-x line {
    stroke: var(--nx-orange);
    stroke-width: 7;
    stroke-linecap: square;
    fill: none;
  }
  /* Subtle continuous breathing after entry */
  .center-x.idle { animation: xIdle 8s ease-in-out infinite; }
  @keyframes xIdle {
    0%, 100% { transform: translate(-50%, -50%) scale(1) rotate(0deg); }
    50%      { transform: translate(-50%, -50%) scale(1.03) rotate(0.6deg); }
  }

  /* old center-logo block — UNUSED but kept harmless */
  .center-logo {
    position: absolute;
    left: 60%;
    top: 50%;
    transform: translate(-50%, -50%) scale(0);
    z-index: 6;
    text-align: center;
    opacity: 0;
    animation: logoGrow 1300ms var(--nx-ease-spring) 1800ms forwards;
  }
  @keyframes logoGrow {
    0%   { transform: translate(-50%, -50%) scale(0); opacity: 0; }
    50%  { opacity: 1; }
    100% { transform: translate(-50%, -50%) scale(1); opacity: 1; }
  }

  .center-logo .x-big {
    width: clamp(80px, 9vw, 130px);
    height: clamp(80px, 9vw, 130px);
    margin: 0 auto 20px;
    display: block;
  }
  .center-logo .x-big line {
    stroke: var(--nx-orange);
    stroke-width: 8;
    stroke-linecap: square;
    fill: none;
  }
  .center-logo .word-big {
    display: block;
    margin: 0 auto;
    height: clamp(80px, 9vw, 130px);
  }
  .center-logo .word-big line {
    stroke: var(--nx-on-ink);
    stroke-width: 8;
    stroke-linecap: square;
    fill: none;
  }
  .center-logo .sgoic-big {
    margin-top: 16px;
    font-family: var(--nx-font-sans);
    font-weight: 500;
    font-size: clamp(14px, 1.3vw, 20px);
    letter-spacing: 0.42em;
    color: var(--nx-on-ink);
    padding-left: 0.42em;
  }

  /* halo behind logo so it stays readable over bars */
  .center-logo::before {
    content: "";
    position: absolute;
    inset: -10% -8%;
    background: radial-gradient(closest-side, rgba(45,45,44,0.92) 0%, rgba(45,45,44,0) 75%);
    z-index: -1;
    pointer-events: none;
  }

  /* ─────────────────────────────────────────────
     RIGHT CHAPTER LIST
     ───────────────────────────────────────────── */
  .chapter-list {
    position: absolute;
    right: clamp(28px, 4vw, 64px);
    top: 50%;
    transform: translateY(-50%);
    z-index: 7;
    font-family: var(--nx-font-mono);
    font-size: 11px;
    letter-spacing: 0.22em;
    color: var(--nx-mid);
    display: flex;
    flex-direction: column;
    gap: 18px;
    align-items: flex-end;
  }
  .chapter-list .ch {
    display: flex; align-items: center; gap: 12px;
    opacity: 0;
    transform: translateX(12px);
    animation: chIn 600ms var(--nx-ease-arch) forwards;
  }
  .chapter-list .ch:nth-child(1) { animation-delay: 3400ms; }
  .chapter-list .ch:nth-child(2) { animation-delay: 3500ms; }
  .chapter-list .ch:nth-child(3) { animation-delay: 3600ms; }
  .chapter-list .ch:nth-child(4) { animation-delay: 3700ms; }
  .chapter-list .ch::after {
    content: "";
    width: 22px; height: 1px; background: var(--nx-mid);
    transition: background 240ms, width 240ms;
  }
  .chapter-list .ch:hover { color: var(--nx-on-ink); }
  .chapter-list .ch:hover::after { background: var(--nx-orange); width: 34px; }
  @keyframes chIn { to { opacity: 1; transform: translateX(0); } }

  /* ─────────────────────────────────────────────
     SCROLL HINT (bottom-center)
     ───────────────────────────────────────────── */
  .scroll-hint {
    position: absolute;
    bottom: 28px;
    left: 50%;
    transform: translateX(-50%);
    z-index: 7;
    font-family: var(--nx-font-mono);
    font-size: 10px;
    letter-spacing: 0.32em;
    color: var(--nx-mid);
    text-transform: uppercase;
    text-align: center;
    opacity: 0;
    animation: fadeIn 800ms var(--nx-ease-out) 3800ms forwards;
  }
  .scroll-hint .line {
    width: 1px; height: 36px;
    background: linear-gradient(to bottom, transparent, var(--nx-orange));
    margin: 10px auto 0;
    animation: scrollLine 2s ease-in-out infinite 4500ms;
  }
  @keyframes scrollLine {
    0%, 100% { transform: scaleY(1); opacity: 0.4; }
    50%      { transform: scaleY(1.3); opacity: 1; }
  }

  /* ─────────────────────────────────────────────
     CURSOR COMPANION
     ───────────────────────────────────────────── */
  .cursor-x {
    position: fixed;
    width: 26px; height: 26px;
    pointer-events: none;
    z-index: 1000;
    opacity: 0;
    transition: opacity 240ms, width 200ms, height 200ms;
    transform: translate(-50%, -50%);
    mix-blend-mode: screen;
  }
  .cursor-x.on { opacity: 0.85; }
  .cursor-x.hot { width: 40px; height: 40px; opacity: 1; }
  .cursor-x line {
    stroke: var(--nx-orange);
    stroke-width: 8;
    fill: none;
    stroke-linecap: square;
  }

  /* ─────────────────────────────────────────────
     REPLAY
     ───────────────────────────────────────────── */
  .replay {
    position: absolute;
    bottom: 28px;
    right: clamp(28px, 4vw, 64px);
    background: transparent;
    border: 1px solid var(--nx-ink-3);
    color: var(--nx-mid);
    font-family: var(--nx-font-mono);
    font-size: 10px;
    letter-spacing: 0.22em;
    text-transform: uppercase;
    padding: 9px 16px;
    cursor: none;
    z-index: 30;
    transition: all 220ms var(--nx-ease-out);
    border-radius: var(--nx-r-pill);
    opacity: 0;
    animation: fadeIn 600ms var(--nx-ease-out) 3800ms forwards;
  }
  .replay:hover { border-color: var(--nx-orange); color: var(--nx-orange); }
</style>
</head>
<body>
<div class="stage">

  <!-- TOP NAV -->
  <div class="topnav">
    <span class="left"><span class="dot"></span>CONTACTE-NOS</span>
    <span class="brand-center">
      <svg viewBox="0 0 100 100" aria-hidden="true">
        <line x1="14" y1="14" x2="42" y2="42"/>
        <line x1="86" y1="14" x2="58" y2="42"/>
        <line x1="58" y1="58" x2="86" y2="86"/>
        <line x1="42" y1="58" x2="14" y2="86"/>
      </svg>
      <span>NEXA</span>
    </span>
    <span class="right">
      <button class="pdf">↓ PDF</button>
      <span class="lang"><b>PT</b><em>EN</em></span>
    </span>
  </div>

  <div class="modes" id="modes">
    <button data-mode="cascade" class="active">CASCADE</button>
    <button data-mode="avalanche">AVALANCHE</button>
    <button data-mode="construct">CONSTRUCT</button>
    <button data-mode="burst">BURST</button>
    <button data-mode="origami">ORIGAMI</button>
  </div>

  <div class="parallax" id="parallax">

    <div class="skyline" id="skyline"></div>

    <!-- TITLE: 110 strokes assemble into the title (then crossfade to clean type) -->
    <div class="title-layer" id="titleLayer"></div>
    <h1 class="title-final" id="titleFinal">
      RELATÓRIO DE<span class="l2">SUSTENTABILIDADE</span>
    </h1>

    <!-- CENTER big X-icon -->
    <svg class="center-x" id="centerX" viewBox="0 0 100 100" aria-hidden="true">
      <line x1="14" y1="14" x2="42" y2="42"/>
      <line x1="86" y1="14" x2="58" y2="42"/>
      <line x1="58" y1="58" x2="86" y2="86"/>
      <line x1="42" y1="58" x2="14" y2="86"/>
    </svg>

    <!-- LEFT: 2025 + quote -->
    <div class="below-title">
      <div class="year">2025</div>
      <div class="quote">
        Good governance and long-term thinking are the foundations of sustainable investment.
        <span class="quote-attr">Howard Marks</span>
      </div>

  </div>

  <!-- Right chapter list -->
  <div class="chapter-list">
    <div class="ch">01 · CONTEXTO</div>
    <div class="ch">02 · IMPACTO</div>
    <div class="ch">03 · GOVERNAÇÃO</div>
    <div class="ch">04 · PERSPETIVAS</div>
  </div>

  <!-- Scroll hint -->
  <div class="scroll-hint">
    SCROLL
    <div class="line"></div>
  </div>

  <button class="replay" onclick="replayAll()">↻ REPLAY</button>

  <svg class="cursor-x" id="cursorX" viewBox="0 0 100 100" aria-hidden="true">
    <line x1="14" y1="14" x2="42" y2="42"/>
    <line x1="86" y1="14" x2="58" y2="42"/>
    <line x1="58" y1="58" x2="86" y2="86"/>
    <line x1="42" y1="58" x2="14" y2="86"/>
  </svg>

</div>

<script>
/* ════════════════════════════════════════════════
   LETTER GEOMETRY — each letter is a list of strokes
   in a 0.7-wide × 1-tall box (normalized).
   Stroke = [x1, y1, x2, y2]
   ════════════════════════════════════════════════ */
const LETTERS = {
  'R': [[0,0,0,1],[0,0,0.7,0],[0.7,0,0.7,0.5],[0,0.5,0.7,0.5],[0,0.5,0.7,1]],
  'E': [[0,0,0,1],[0,0,0.7,0],[0,0.5,0.6,0.5],[0,1,0.7,1]],
  'L': [[0,0,0,1],[0,1,0.7,1]],
  'A': [[0,1,0.35,0],[0.35,0,0.7,1],[0.13,0.6,0.57,0.6]],
  'T': [[0,0,0.7,0],[0.35,0,0.35,1]],
  'Ó': [[0,0,0.7,0],[0.7,0,0.7,1],[0.7,1,0,1],[0,1,0,0],[0.28,-0.22,0.5,-0.05]],
  'O': [[0,0,0.7,0],[0.7,0,0.7,1],[0.7,1,0,1],[0,1,0,0]],
  'I': [[0.35,0,0.35,1]],
  'D': [[0,0,0,1],[0,0,0.5,0],[0.5,0,0.7,0.2],[0.7,0.2,0.7,0.8],[0.7,0.8,0.5,1],[0,1,0.5,1]],
  'S': [[0.7,0,0,0],[0,0,0,0.5],[0,0.5,0.7,0.5],[0.7,0.5,0.7,1],[0.7,1,0,1]],
  'U': [[0,0,0,0.8],[0,0.8,0.15,1],[0.15,1,0.55,1],[0.55,1,0.7,0.8],[0.7,0.8,0.7,0]],
  'N': [[0,0,0,1],[0,0,0.7,1],[0.7,0,0.7,1]],
  'B': [[0,0,0,1],[0,0,0.55,0],[0.55,0,0.7,0.15],[0.7,0.15,0.7,0.35],[0.7,0.35,0.55,0.5],[0,0.5,0.55,0.5],[0.55,0.5,0.7,0.65],[0.7,0.65,0.7,0.85],[0.7,0.85,0.55,1],[0,1,0.55,1]],
  ' ': [],
};

const TITLE_LINES = ["RELATÓRIO DE", "SUSTENTABILIDADE"];
const titleLayer = document.getElementById('titleLayer');

let strokes = [];   // global so we can re-layout / re-trigger

function buildTitle() {
  titleLayer.innerHTML = '';
  strokes = [];

  const W = window.innerWidth;
  const H = window.innerHeight;

  // Unit size U based on viewport. Make line 2 fit within ~48% of viewport.
  // SUSTENTABILIDADE has 16 chars; advance = 0.85*U → 16 * 0.85 * U = 13.6 U.
  // Fit in ~46vw → U = 0.46*W / 13.6
  const targetWidth = W * 0.48;
  const U = Math.min(86, Math.max(40, targetWidth / 13.6));

  const advance = U * 0.78;
  const spaceW  = U * 0.45;
  const lineH   = U * 1.30;
  const startX  = Math.max(24, W * 0.045);
  const startY  = Math.max(24, H * 0.16);

  TITLE_LINES.forEach((line, li) => {
    let cx = startX;
    const cy = startY + li * lineH;
    for (let i = 0; i < line.length; i++) {
      const ch = line[i];
      const letter = LETTERS[ch];
      const isSpace = ch === ' ';
      if (letter && letter.length) {
        for (const seg of letter) {
          const x1 = cx + seg[0] * U;
          const y1 = cy + seg[1] * U;
          const x2 = cx + seg[2] * U;
          const y2 = cy + seg[3] * U;
          const dx = x2 - x1, dy = y2 - y1;
          const len = Math.hypot(dx, dy);
          const ang = Math.atan2(dy, dx) * 180 / Math.PI;
          // Random initial state (scatter across full viewport)
          const initX = Math.random() * W;
          const initY = Math.random() * H;
          const initRot = (Math.random() - 0.5) * 720;
          const initScale = 0.4 + Math.random() * 0.8;
          // Delay: per stroke, staggered so it looks like a wave
          const delay = 400 + Math.random() * 1200;

          const el = document.createElement('div');
          el.className = 'ts';
          el.style.width = len + 'px';
          el.style.transform = `translate(${initX}px, ${initY}px) rotate(${initRot}deg) scale(${initScale})`;
          el.style.opacity = '0';
          titleLayer.appendChild(el);

          strokes.push({ el, x1, y1, len, ang, delay });
        }
        cx += advance;
      } else if (isSpace) {
        cx += spaceW;
      }
    }
  });

  // Trigger assembly per stroke after its individual delay
  strokes.forEach(s => {
    // First make sure browser sees the initial state by next paint
    requestAnimationFrame(() => {
      setTimeout(() => {
        s.el.style.transform = `translate(${s.x1}px, ${s.y1}px) rotate(${s.ang}deg) scale(1)`;
        s.el.style.opacity = '1';
      }, s.delay);
    });
  });
}

function runTitleSequence() {
  buildTitle();
  const titleFinal = document.getElementById('titleFinal');
  const layer = document.getElementById('titleLayer');
  titleFinal.classList.remove('show');
  layer.classList.remove('fade');
  // After strokes assemble (~2.6s), crossfade to clean Montserrat type
  setTimeout(() => {
    layer.classList.add('fade');
    titleFinal.classList.add('show');
  }, 3000);
}
runTitleSequence();

window.addEventListener('resize', () => {
  // Rebuild positions (skip initial animation, settle immediately)
  buildTitle();
  // Force final clean text visible after resize
  document.getElementById('titleLayer').classList.add('fade');
  document.getElementById('titleFinal').classList.add('show');
});

/* ════════════════════════════════════════════════
   SKYLINE BARS — same as v2
   ════════════════════════════════════════════════ */
const BARS = [
  { x: 60, y: 12, w: 22, r: -26 },
  { x: 73, y: 19, w: 14, r: -26 },
  { x: 54, y: 22, w: 20, r: -26 },
  { x: 68, y: 28, w: 18, r: -26 },
  { x: 48, y: 34, w: 22, r: -25 },
  { x: 64, y: 40, w: 22, r: -25 },
  { x: 52, y: 46, w: 24, r: -25 },
  { x: 70, y: 52, w: 22, r: -24 },
  { x: 56, y: 58, w: 28, r: -23 },
  { x: 72, y: 62, w: 20, r: -23 },
  { x: 50, y: 68, w: 30, r: -22 },
  { x: 66, y: 74, w: 26, r: -22 },
  { x: 54, y: 80, w: 32, r: -20 },
  { x: 70, y: 86, w: 26, r: -18 },
  { x: 60, y: 92, w: 32, r: -18 },
  { x: 78, y: 96, w: 22, r: -16 },
];

const skylineEl = document.getElementById('skyline');
let W = window.innerWidth, H = window.innerHeight;
const BAR_H = 18;
const bars = BARS.map((b, i) => {
  const el = document.createElement('div');
  el.className = 'bar';
  skylineEl.appendChild(el);
  return {
    el, base: b, delay: i * 60,
    spinVel: 0, extraRot: 0, touched: false,
    centerX: 0, centerY: 0,
  };
});

function layoutBars() {
  W = window.innerWidth; H = window.innerHeight;
  bars.forEach(bar => {
    const px = (bar.base.x / 100) * W;
    const py = (bar.base.y / 100) * H;
    const pw = (bar.base.w / 100) * W;
    bar.el.style.left = px + 'px';
    bar.el.style.top  = py + 'px';
    bar.el.style.width = pw + 'px';
    const rot = bar.base.r * Math.PI / 180;
    bar.centerX = px + (pw / 2) * Math.cos(rot);
    bar.centerY = py + (pw / 2) * Math.sin(rot);
  });
}
layoutBars();
window.addEventListener('resize', layoutBars);

const MODES = {
  cascade: (p) => ({ tx: (1-p)*(W*0.6), ty: 0, rotDelta: 0, scaleX: 0.3+0.7*p, scaleY: 1, opacity: p, origin: '50% 50%' }),
  avalanche: (p) => ({ tx: 0, ty: -(1-p)*(H*0.8), rotDelta: (1-p)*540, scaleX: 1, scaleY: 1, opacity: Math.min(1, p*1.4), origin: '50% 50%' }),
  construct: (p) => ({ tx: 0, ty: 0, rotDelta: 0, scaleX: p, scaleY: 1, opacity: p, origin: '0% 50%' }),
  burst:     (p) => ({ tx: 0, ty: 0, rotDelta: (1-p)*90, scaleX: 0.05+0.95*p, scaleY: 0.05+0.95*p, opacity: p, origin: '50% 50%' }),
  origami:   (p) => ({ tx: 0, ty: 0, rotDelta: (1-p)*-110, scaleX: 1, scaleY: 0.2+0.8*p, opacity: p, origin: '50% 50%' }),
};

let currentMode = 'cascade';
let modeStartTime = performance.now();
const ENTRY_DURATION = 1100;
function easeOutCubic(t){ return 1-Math.pow(1-t,3); }
function easeOutBack(t){ const c=1.7,c3=c+1; return 1+c3*Math.pow(t-1,3)+c*Math.pow(t-1,2); }

document.querySelectorAll('.modes button').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.modes button').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    currentMode = btn.dataset.mode;
    modeStartTime = performance.now();
    bars.forEach(b => { b.spinVel = 0; b.extraRot = 0; b.touched = false; });
  });
});

/* ════════════════════════════════════════════════
   CURSOR & PARALLAX
   ════════════════════════════════════════════════ */
const cursorEl = document.getElementById('cursorX');
const parallaxEl = document.getElementById('parallax');
let mx = -9999, my = -9999;
let cxNow = -50, cyNow = -50;
let mxN = 0, myN = 0;
let pxOff = 0, pyOff = 0;

window.addEventListener('mousemove', (e) => {
  mx = e.clientX; my = e.clientY;
  mxN = (e.clientX / W) - 0.5;
  myN = (e.clientY / H) - 0.5;
  cursorEl.classList.add('on');
});
window.addEventListener('mouseleave', () => {
  cursorEl.classList.remove('on');
  mx = -9999; my = -9999;
});
document.querySelectorAll('.modes button, .x-big, .pdf, .ch, .replay').forEach(el => {
  el.addEventListener('mouseenter', () => cursorEl.classList.add('hot'));
  el.addEventListener('mouseleave', () => cursorEl.classList.remove('hot'));
});

const SPIN_RADIUS = 110;
const SPIN_ACCEL = 0.85;
const SPIN_FRICTION = 0.94;

function frame(now) {
  // parallax
  pxOff += (mxN * 12 - pxOff) * 0.06;
  pyOff += (myN * 12 - pyOff) * 0.06;
  parallaxEl.style.transform = `translate3d(${pxOff}px, ${pyOff}px, 0)`;

  // cursor follow
  cxNow += (mx - cxNow) * 0.25;
  cyNow += (my - cyNow) * 0.25;
  cursorEl.style.left = cxNow + 'px';
  cursorEl.style.top  = cyNow + 'px';

  const motion = MODES[currentMode];
  bars.forEach(bar => {
    const elapsed = now - modeStartTime - bar.delay;
    const p = Math.max(0, Math.min(1, elapsed / ENTRY_DURATION));
    const eased = currentMode === 'burst' ? easeOutBack(p) : easeOutCubic(p);
    const m = motion(eased);

    let cursorRot = 0;
    if (p >= 1) {
      const cxAdj = bar.centerX + pxOff;
      const cyAdj = bar.centerY + pyOff;
      const dx = mx - cxAdj, dy = my - cyAdj;
      const dist = Math.sqrt(dx*dx + dy*dy);
      const proximity = Math.max(0, 1 - dist / SPIN_RADIUS);
      if (proximity > 0.05) bar.spinVel += proximity * SPIN_ACCEL;
      bar.spinVel *= SPIN_FRICTION;
      bar.extraRot += bar.spinVel;
      if (Math.abs(bar.spinVel) < 0.1 && proximity < 0.05) {
        const target = Math.round(bar.extraRot / 360) * 360;
        bar.extraRot += (target - bar.extraRot) * 0.08;
      }
      cursorRot = bar.extraRot;

      // Orange when touched
      const shouldTouch = proximity > 0.05;
      if (shouldTouch && !bar.touched) { bar.touched = true; bar.el.classList.add('touched'); }
      else if (!shouldTouch && bar.touched && Math.abs(bar.spinVel) < 0.3) { bar.touched = false; bar.el.classList.remove('touched'); }
    }

    const rot = bar.base.r + m.rotDelta + cursorRot;
    bar.el.style.opacity = m.opacity * 0.9;
    bar.el.style.transform =
      `translate(${m.tx}px, ${m.ty}px) rotate(${rot}deg) scale(${m.scaleX}, ${m.scaleY})`;
    bar.el.style.transformOrigin = m.origin;
  });

  requestAnimationFrame(frame);
}
requestAnimationFrame(frame);

/* ════════════════════════════════════════════════
   REPLAY
   ════════════════════════════════════════════════ */
function replayAll() {
  // Title: rebuild with fresh scatter + re-crossfade to clean type
  runTitleSequence();
  // Bars: restart entry
  modeStartTime = performance.now();
  bars.forEach(b => { b.spinVel = 0; b.extraRot = 0; b.touched = false; b.el.classList.remove('touched'); });
  // Center X + year + quote + chapters + scroll: restart their CSS animations
  ['.center-x', '.year', '.quote', '.chapter-list .ch', '.scroll-hint'].forEach(sel => {
    document.querySelectorAll(sel).forEach(el => {
      el.style.animation = 'none';
      void el.offsetWidth;
      el.style.animation = '';
    });
  });
}
</script>
